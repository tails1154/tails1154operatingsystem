---
dontChroot: false
timeout: 30
script:
  - command: "mkdir -p /etc/systemd/system/ollama.service.d"
    timeout: 10
    verbose: false
  - command: "/bin/bash -c 'cat > /etc/systemd/system/ollama.service.d/override.conf << EOF
[Service]
ExecStartPost=/bin/bash -c \"sleep 5 && /usr/bin/ollama pull llama3.2:3b 2>/dev/null || true\"
ExecStartPost=/bin/bash -c \"/usr/bin/ollama pull qwen2.5:1.5b 2>/dev/null || true\"
EOF'"
    timeout: 10
    verbose: true
i18n:
    name: "Configuring AI models for first boot"
